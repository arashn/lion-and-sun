<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Widget Demo</title>
    <style>
      :root {
        color-scheme: light;
        --bg-1: #fff9f0;
        --bg-2: #e9f3ff;
        --ink: #13233a;
        --muted: #506681;
        --panel: rgba(255, 255, 255, 0.82);
        font-family: Georgia, "Times New Roman", serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, var(--bg-1), transparent 36%),
          radial-gradient(circle at bottom right, var(--bg-2), transparent 38%),
          linear-gradient(180deg, #f6f8fc 0%, #edf3fb 100%);
      }

      .shell {
        width: min(1120px, 92vw);
        margin: 0 auto;
        padding: 3rem 0 4rem;
      }

      .hero {
        display: grid;
        gap: 1.6rem;
        align-items: start;
      }

      .copy {
        max-width: 680px;
      }

      .eyebrow {
        margin: 0 0 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        font-size: 0.78rem;
        color: var(--muted);
      }

      h1 {
        margin: 0 0 0.8rem;
        font-size: clamp(2.4rem, 5vw, 4.6rem);
        line-height: 0.95;
      }

      .lead {
        margin: 0;
        max-width: 52ch;
        color: var(--muted);
        font-size: 1.05rem;
        line-height: 1.6;
      }

      .stage {
        margin-top: 2rem;
        background: var(--panel);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(123, 149, 181, 0.28);
        border-radius: 26px;
        padding: 1.25rem;
        box-shadow: 0 24px 70px rgba(19, 35, 58, 0.08);
      }

      .stage-header {
        display: flex;
        justify-content: space-between;
        gap: 1rem;
        flex-wrap: wrap;
        margin-bottom: 1rem;
      }

      .stage-title {
        margin: 0;
        font-size: 1.25rem;
      }

      .stage-note {
        margin: 0.35rem 0 0;
        color: var(--muted);
      }

      .badge {
        align-self: start;
        border-radius: 999px;
        padding: 0.5rem 0.8rem;
        background: #13233a;
        color: #fff;
        font-size: 0.84rem;
      }

      #widget-demo {
        min-height: 600px;
      }

      @media (max-width: 720px) {
        .shell {
          padding-top: 2rem;
        }
        .stage {
          padding: 0.8rem;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="stage">
        <div id="widget-demo" data-lion-sun-widget data-title="Livestream Access"></div>
      </section>
    </main>

    <script src="/embed-widget.js"></script>
  </body>
</html>
