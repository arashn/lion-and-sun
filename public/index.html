<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Livestream Access</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>Private Livestream</h1>
      <p id="offer-text"></p>

      <section id="auth-card" class="card-block">
        <h2>Login</h2>
        <label for="phone">Phone (E.164)</label>
        <input id="phone" type="tel" placeholder="+14155550123" autocomplete="tel" />
        <button id="request-code" class="secondary">Send Login Code</button>

        <div id="code-section" class="hidden">
          <label for="code">Login Code</label>
          <input
            id="code"
            type="text"
            inputmode="numeric"
            autocomplete="one-time-code"
            placeholder="Enter code"
          />
          <button id="verify-code" class="secondary">Verify Code</button>
        </div>
      </section>

      <section id="checkout-card" class="card-block hidden">
        <p id="user-phone"></p>
        <div class="action-row">
          <button id="pay-button" class="primary">Pay With Stripe Checkout</button>
          <a id="watch-link" class="link-btn hidden" href="/livestream">Watch Livestream</a>
          <button id="logout-button" class="ghost">Log Out</button>
        </div>
      </section>

      <p id="status" class="status"></p>
    </main>

    <script src="/config.js"></script>
    <script>
      const statusEl = document.getElementById('status');
      const offerTextEl = document.getElementById('offer-text');

      const authCardEl = document.getElementById('auth-card');
      const checkoutCardEl = document.getElementById('checkout-card');
      const codeSectionEl = document.getElementById('code-section');
      const userPhoneEl = document.getElementById('user-phone');

      const phoneEl = document.getElementById('phone');
      const codeEl = document.getElementById('code');
      const requestCodeEl = document.getElementById('request-code');
      const verifyCodeEl = document.getElementById('verify-code');
      const payButtonEl = document.getElementById('pay-button');
      const logoutButtonEl = document.getElementById('logout-button');
      const watchLinkEl = document.getElementById('watch-link');

      offerTextEl.textContent = `${window.APP_CONFIG.offerText}. Access duration: ${window.APP_CONFIG.streamAccessHours} hours.`;
      codeEl.maxLength = window.APP_CONFIG.loginCodeLength;

      function setStatus(message) {
        statusEl.textContent = message;
      }

      function setBusy(isBusy) {
        requestCodeEl.disabled = isBusy;
        verifyCodeEl.disabled = isBusy;
        payButtonEl.disabled = isBusy;
        logoutButtonEl.disabled = isBusy;
      }

      function renderAuthState(state) {
        if (state.authenticated) {
          authCardEl.classList.add('hidden');
          checkoutCardEl.classList.remove('hidden');
          userPhoneEl.textContent = `Logged in as ${state.phone || 'phone user'}`;
          watchLinkEl.classList.toggle('hidden', !state.hasAccess);
        } else {
          authCardEl.classList.remove('hidden');
          checkoutCardEl.classList.add('hidden');
          watchLinkEl.classList.add('hidden');
        }
      }

      async function loadAuthState() {
        const res = await fetch('/auth/me');
        const data = await res.json();
        renderAuthState(data);
      }

      const params = new URLSearchParams(window.location.search);
      if (params.get('canceled') === '1') {
        setStatus('Checkout canceled. You can try again.');
      }

      requestCodeEl.addEventListener('click', async () => {
        const phone = phoneEl.value.trim();
        if (!phone) {
          setStatus('Enter your phone first (example: +14155550123).');
          return;
        }

        setBusy(true);
        setStatus('Sending code...');
        try {
          const res = await fetch('/auth/request-code', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ phone }),
          });
          const data = await res.json();
          if (!res.ok) {
            throw new Error(data.error || 'Unable to send code');
          }

          codeSectionEl.classList.remove('hidden');
          setStatus('Code sent by SMS.');
        } catch (error) {
          setStatus(error.message);
        } finally {
          setBusy(false);
        }
      });

      verifyCodeEl.addEventListener('click', async () => {
        const phone = phoneEl.value.trim();
        const code = codeEl.value.trim();
        if (!phone || !code) {
          setStatus('Enter both phone and code.');
          return;
        }

        setBusy(true);
        setStatus('Verifying code...');
        try {
          const res = await fetch('/auth/verify-code', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ phone, code }),
          });
          const data = await res.json();
          if (!res.ok) {
            throw new Error(data.error || 'Unable to verify code');
          }

          setStatus('Logged in.');
          await loadAuthState();
        } catch (error) {
          setStatus(error.message);
        } finally {
          setBusy(false);
        }
      });

      payButtonEl.addEventListener('click', async () => {
        setBusy(true);
        setStatus('Starting checkout...');
        try {
          const res = await fetch('/create-checkout-session', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
          });

          const data = await res.json();
          if (!res.ok || !data.url) {
            throw new Error(data.error || 'Checkout failed');
          }

          window.location.href = data.url;
        } catch (error) {
          setStatus(error.message);
          setBusy(false);
        }
      });

      logoutButtonEl.addEventListener('click', async () => {
        setBusy(true);
        try {
          await fetch('/auth/logout', { method: 'POST' });
          setStatus('Logged out.');
          codeEl.value = '';
          await loadAuthState();
        } finally {
          setBusy(false);
        }
      });

      loadAuthState().catch(() => {
        setStatus('Could not load auth state.');
      });
    </script>
  </body>
</html>
