<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Livestream</title>
    <style>
      :root {
        color-scheme: light;
        --bg-1: #fff9f0;
        --bg-2: #e9f3ff;
        --ink: #13233a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, var(--bg-1), transparent 36%),
          radial-gradient(circle at bottom right, var(--bg-2), transparent 38%),
          linear-gradient(180deg, #f6f8fc 0%, #edf3fb 100%);
        font-family: Georgia, "Times New Roman", serif;
      }

      main {
        width: min(1120px, 92vw);
        margin: 0 auto;
        padding: 3rem 0 4rem;
      }

      #livestream-widget {
        min-height: 600px;
      }

      @media (max-width: 720px) {
        main {
          padding-top: 2rem;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div
        id="livestream-widget"
        data-lion-sun-widget
        data-title="Livestream"
        data-return-url="/livestream"
      ></div>
    </main>

    <script src="/embed-widget.js"></script>
  </body>
</html>
